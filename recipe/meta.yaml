{% set name = "flake8-self" %}
{% set version = "0.2.2" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/Korijn/{{ name }}/archive/{{ version }}.tar.gz
  sha256: 6c592fa16451da6de268ea17cb5878c764797f08c1d5a47a6f886cb0ffc2ccad

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - flake8

test:
  requires:
    - python {{ python_min }}
  imports:
    - flake8_self

about:
  home: http://github.com/Korijn/flake8-self
  license: Freely Distributable
  summary: private member access linting plugin for flake8

extra:
  recipe-maintainers:
    - Korijn
